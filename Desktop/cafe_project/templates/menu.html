{% extends 'base.html' %}

{% block content %}
<h2>Menümüz</h2>

<div style="text-align: center; margin-bottom: 30px;">
    <button class="filter-btn active" onclick="filterSelection('all')">Tümü</button>
    <button class="filter-btn" onclick="filterSelection('kahve')">Kahveler</button>
    <button class="filter-btn" onclick="filterSelection('tatli')">Tatlılar</button>
    <button class="filter-btn" onclick="filterSelection('sicak')">Sıcak İçecekler</button>
</div>

<div class="menu-grid">
    {% for item in items %}
    <div class="menu-card {{ item.category }}">
        <img src="{{ url_for('static', filename='images/' + item.img) }}" alt="{{ item.name }}" style="width:100%; height:200px; object-fit:cover; border-radius:8px; margin-bottom:15px;">
        
        <h3>{{ item.name }}</h3>
        <p>{{ item.desc }}</p>
        <span class="price">{{ item.price }} TL</span>
    </div>
    {% endfor %}
</div>
{% endblock %}
