{% extends "base.html" %}
{% block content %}

<section class="menu-section">
  <div class="menu-header">
    <h2>Our Menu</h2>
  </div>

  <!-- Filters -->
  <div class="menu-filters" id="menuFilters">
    <button class="filter-btn active" data-cat="All">All</button>
    <button class="filter-btn" data-cat="Coffee">Coffee</button>
    <button class="filter-btn" data-cat="Tea">Tea</button>
    <button class="filter-btn" data-cat="Cold Drinks">Cold Drinks</button>
    <button class="filter-btn" data-cat="Desserts">Desserts</button>
  </div>

  <!-- Grid -->
  <div class="menu-grid" id="menuGrid">
    <!-- JS will render cards here -->
  </div>
</section>

<!-- POPUP MODAL -->
<div id="productModal" class="modal-overlay" style="display:none;">
  <div class="modal-card">
    <button class="modal-close" id="modalClose" aria-label="Close">×</button>

    <div class="modal-body">
      <div class="modal-img-wrap">
        <img id="modalImg" src="" alt="Product image" />
      </div>

      <div class="modal-info">
        <div class="modal-top">
          <h3 id="modalTitle"></h3>
          <div class="modal-price" id="modalPrice"></div>
        </div>

        <div class="modal-meta">
          <span class="modal-category" id="modalCategory"></span>
        </div>

        <p class="modal-desc" id="modalDesc"></p>

        <div class="modal-tags" id="modalTags"></div>

      </div>
    </div>
  </div>
</div>

<!-- Minimal CSS only for modal (istersen style.css'e taşırsın) -->
<style>
  .modal-overlay{
    position:fixed; inset:0;
    background: rgba(0,0,0,0.45);
    display:flex; align-items:center; justify-content:center;
    padding: 18px;
    z-index: 9999;
  }
  .modal-card{
    width: min(980px, 96vw);
    background: #fff;
    border-radius: 18px;
    overflow:hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    position: relative;
  }
  .modal-close{
    position:absolute; top:10px; right:12px;
    width:40px; height:40px;
    border-radius:999px;
    border: 1px solid rgba(0,0,0,0.12);
    background:#fff;
    font-size: 26px;
    cursor:pointer;
    line-height: 1;
  }
  .modal-body{
    display:grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 0;
  }
  .modal-img-wrap{
    background:#fafafa;
    border-right: 1px solid rgba(0,0,0,0.08);
    min-height: 360px;
  }
  .modal-img-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .modal-info{
    padding: 18px 18px 20px;
  }
  .modal-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap: 12px;
  }
  .modal-top h3{
    margin:0;
    font-size: 26px;
  }
  .modal-price{
    font-weight: 800;
    font-size: 18px;
  }
  .modal-meta{
    margin-top: 6px;
    color: #666;
    font-weight: 600;
  }
  .modal-desc{
    margin-top: 12px;
    color:#333;
  }
  .modal-tags{
    margin-top: 12px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .modal-tag{
    font-size: 13px;
    font-weight: 700;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid rgba(0,0,0,0.15);
    background: #fff;
  }
  .modal-link{
    display:inline-block;
    margin-top: 14px;
    text-decoration:none;
    font-weight: 700;
  }
  @media(max-width: 820px){
    .modal-body{ grid-template-columns: 1fr; }
    .modal-img-wrap{ border-right:none; border-bottom: 1px solid rgba(0,0,0,0.08); }
  }
</style>

<script src="{{ url_for('static', filename='js/menu.js') }}"></script>
{% endblock %}
