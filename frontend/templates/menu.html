{% extends "base.html" %}

{% block content %}

<div class="menu-header">
  <h2>Our Menu</h2>

  <!-- AI Menu Assistant -->
  <section class="ai-box">
    <h3>AI Menu Assistant</h3>
    <p class="ai-hint">
      Try: "recommend a diet drink" / "vegan dessert" / "no lemon" / "sugar-free"
    </p>

    <div class="ai-row">
      <input id="aiPrompt" type="text" placeholder='e.g. "recommend a diet drink"' />
      <button id="aiBtn" type="button">RECOMMEND</button>
    </div>

    <div id="aiResult" class="ai-result"></div>
  </section>

  <div class="menu-filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="coffee">Coffee</button>
    <button class="filter-btn" data-filter="tea">Tea</button>
    <button class="filter-btn" data-filter="cold">Cold Drinks</button>
    <button class="filter-btn" data-filter="sweet">Desserts</button>
  </div>
</div>

<div class="menu-grid">
  {% for item in items %}
    <div class="menu-card" data-category="{{ item.category }}">
      <img src="{{ url_for('static', filename='images/' + item.img) }}" alt="{{ item.name }}">
      <div class="card-info">
        <h3>{{ item.name }}</h3>
        <p>{{ item.desc }}</p>
        <span class="price">{{ item.price }} TL</span>
      </div>
    </div>
  {% endfor %}
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script src="{{ url_for('static', filename='js/ai.js') }}"></script>

{% endblock %}
