{% extends "base.html" %}
{% block content %}

<section class="menu-section">
  <div class="menu-header">
    <h2>Our Menu</h2>
  </div>

  <!-- Filters -->
  <div class="menu-filters" id="menuFilters">
    <button class="filter-btn active" data-cat="All">All</button>
    <button class="filter-btn" data-cat="Coffee">Coffee</button>
    <button class="filter-btn" data-cat="Tea">Tea</button>
    <button class="filter-btn" data-cat="Cold Drinks">Cold Drinks</button>
    <button class="filter-btn" data-cat="Desserts">Desserts</button>
  </div>

  <!-- Grid -->
  <div class="menu-grid" id="menuGrid"></div>
</section>

<!-- MODAL -->
<div id="productModal" class="modal-overlay" style="display:none;">
  <div class="modal-card">
    <button class="modal-close" id="modalClose" aria-label="Close">×</button>

    <div class="modal-body">
      <div class="modal-img-wrap">
        <img id="modalImg" src="" alt="Product image" />
      </div>

      <div class="modal-info">
        <div class="modal-title-row">
          <h3 id="modalTitle"></h3>
        </div>

        <div class="modal-category" id="modalCategory"></div>
        <div class="modal-price" id="modalPrice"></div>

        <p class="modal-desc" id="modalDesc"></p>

        <div class="modal-tags" id="modalTags"></div>
      </div>
    </div>
  </div>
</div>

<!-- AI Assistant -->
<div class="ai-box" id="aiBox">
  <div class="ai-head">Caffe HUB Assistant</div>
  <div class="ai-result" id="aiResult">
    <div class="ai-hint">
      Try asking:
      <br>• “recommend a low calorie dessert”
      <br>• “vegan cold drink”
      <br>• “no milk” / “lactose free”
      <br>• “I’m allergic to fruit / nuts”
    </div>
  </div>
  <div class="ai-row">
    <input id="aiPrompt" class="ai-input" type="text" placeholder="Ask something..." />
    <button id="aiBtn" class="ai-send">Send</button>
  </div>
</div>

<script src="{{ url_for('static', filename='js/menu.js') }}"></script>
<script src="{{ url_for('static', filename='js/ai.js') }}"></script>
{% endblock %}
